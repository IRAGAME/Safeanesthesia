<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SPOOA-PM Africa Safe Anesthesia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="/scripts/script.js"></script>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="/" class="logo">
        <img src="/images/spooa/logo.png" alt="SafeAnesthesia Logo">
      </a>
      <div class="header-titles">
        <h1 class="main-title">SPOOA-PM Africa</h1>
        <p class="sub-title">Safe Anesthesia</p>
      </div>
    </div>

  <!-- Bouton menu mobile -->
  <button class="menu-btn" id="menu-btn">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Menu -->
  <nav id="menu" class="menu">
    <ul>
      <li><a href="/">Accueil</a></li>
      <li><a href="/formations">Formations</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>
</header>

  <div class="admin-container">
    <div class="admin-header">
      <h1>Tableau de Bord</h1>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="login-card" style="display: none;">
      <h2>Connexion Admin</h2>
      <form id="login">
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="password" class="input" required>
        </div>
        <button type="submit" class="btn">Se connecter</button>
      </form>
    </div>

    <!-- Dashboard Content -->
    <div id="dashboardContent" style="display: none; width: 100%; flex-direction: column; align-items: center;">
      
      <!-- Formulaire d'ajout -->
      <div class="form-card" id="addFormContainer">
        <h2>Ajouter une formation</h2>
        <form id="addForm" enctype="multipart/form-data">
          <div class="form-group">
            <label>Titre</label>
            <input type="text" name="titre" class="input" required>
          </div>
          <div class="form-group">
            <label>Contenu</label>
            <textarea name="contenu" rows="4" class="input" required></textarea>
          </div>
          <div class="form-group">
            <label>Image</label>
            <input type="file" name="image" accept="image/*">
          </div>
          <button type="submit" class="btn-add-new">Publier</button>
        </form>
      </div>

      <!-- Liste des formations (Grille) -->
      <div id="formations" class="admin-grid"></div>
    </div>
  </div>

  <!-- Modal de modification -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Modifier</h2>
        <button class="close-modal" id="closeModal">&times;</button>
      </div>
      <form id="editForm" enctype="multipart/form-data">
        <div class="form-group">
          <label>Titre</label>
          <input type="text" id="editTitre" name="titre" class="input" required>
        </div>
        <div class="form-group">
          <label>Contenu</label>
          <textarea id="editContenu" name="contenu" rows="6" class="input" required></textarea>
        </div>
        <div class="form-group">
          <div id="currentImage"></div>
          <input type="file" id="editImage" name="image" accept="image/*">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="document.getElementById('editModal').classList.remove('open')">Annuler</button>
          <button type="submit" class="btn-save">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <footer>© SPOOA-PM Africa Safe Anesthesia — Tous droits réservés</footer>

  <script src="/scripts/admin.js"></script>
</body>
</html>
</body>
</html>
